<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="introduction" class="show">
      <p id="l1" class="hidden">Olá.</p>
      <p id="l2" class="hidden">Este não é um teste de inteligência.</p>
      <p id="l3" class="hidden">É um teste de observação.</p>
      <p id="l4" class="hidden">
        Não procure respostas difíceis antes de compreender as fáceis.
      </p>
      <p id="l5" class="hidden">Tudo começa com uma única pergunta.</p>
    </div>

    <div id="question" class="hidden">
      <h1>Qual a cor do céu?</h1>

      <form class="response" id="response-form">
        <input type="text" placeholder="Sua resposta..." id="response-input" />
        <button type="submit">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="#2c292a"
          >
            <path
              d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"
            />
          </svg>
        </button>
      </form>
    </div>
    <script src="index.js"></script>
  </body>
</html>
